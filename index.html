<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vico del Carmine - Menù Digitale</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        :root { --primary: #800020; --gold: #D4AF37; --dark: #1a1a1a; --light: #fdfdfd; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark); color: var(--light); margin: 0; padding: 0; }
        header { text-align: center; background-color: #f7f3e9; border-bottom: 3px solid var(--gold); }
        .hero-img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        .lang-bar { background: #000; padding: 10px; display: flex; justify-content: center; gap: 15px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .lang-btn { background: none; border: none; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .lang-btn.active { opacity: 1; transform: scale(1.2); }
        .flag { width: 30px; border-radius: 2px; }
        .location-bar { background-color: var(--primary); color: white; padding: 12px; text-align: center; font-weight: 600; font-size: 0.85rem; border-bottom: 1px solid var(--gold); }
        .container { max-width: 800px; margin: 0 auto; padding: 10px; }
        .ms { margin-bottom: 15px; background: #222; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .sh { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; cursor: pointer; background: linear-gradient(45deg, #222, #333); }
        .sh:hover { background: #2a2a2a; }
        .st { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .sc { color: var(--gold); transition: 0.3s; font-size: 0.8rem; }
        .ms.open .sc { transform: rotate(180deg); }
        .sb { max-height: 0; opacity: 0; transition: all 0.4s ease-in-out; }
        .ms.open .sb { max-height: 5000px; opacity: 1; padding: 10px 0; }
        .di { padding: 12px 20px; border-bottom: 1px solid #2a2a2a; }
        .dr { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
        .dn { font-weight: 600; font-size: 1.05rem; color: var(--light); }
        .dp { font-weight: 700; color: var(--gold); white-space: nowrap; }
        .ds { font-size: 0.9rem; color: #aaa; margin-top: 5px; font-style: italic; line-height: 1.4; }
        .footer { text-align: center; padding: 30px; font-size: 0.8rem; color: #666; background: #111; }
        [x-cloak] { display: none !important; }
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] .dr { flex-direction: row-reverse; }
    </style>
</head>
<body x-data="{ menu: {}, loading: true, lang: 'it', openSections: ['specialita-stagione'],
    flags: { it: 'https://flagcdn.com/w40/it.png', en: 'https://flagcdn.com/w40/gb.png', fr: 'https://flagcdn.com/w40/fr.png', de: 'https://flagcdn.com/w40/de.png', es: 'https://flagcdn.com/w40/es.png', pt: 'https://flagcdn.com/w40/pt.png', ja: 'https://flagcdn.com/w40/jp.png', ar: 'https://flagcdn.com/w40/sa.png' },
    toggle(slug) { if(this.openSections.includes(slug)) { this.openSections = this.openSections.filter(s => s !== slug) } else { this.openSections.push(slug) } }
}" x-init="fetch('./menu.json').then(res => res.json()).then(data => { menu = data; loading = false; })" :dir="lang === 'ar' ? 'rtl' : 'ltr'">

    <header><img src="hero.png" alt="Header" class="hero-img"></header>

    <nav class="lang-bar">
        <template x-for="l in ['it','en','fr','de','es','pt','ja','ar']">
            <button class="lang-btn" :class="lang === l ? 'active' : ''" @click="lang = l">
                <img :src="flags[l]" :alt="l" class="flag">
            </button>
        </template>
    </nav>

    <div class="location-bar">📍 <span x-text="menu.location"></span> | 📞 055 2336862</div>

    <main class="container" x-cloak x-show="!loading">
        <template x-for="cat in menu.categorie" :key="cat.slug">
            <div class="ms" :class="openSections.includes(cat.slug) ? 'open' : ''">
                <div class="sh" @click="toggle(cat.slug)">
                    <div class="st" x-text="cat.nome[lang] || cat.nome['it']"></div>
                    <span class="sc">▼</span>
                </div>
                <div class="sb">
                    <template x-for="item in cat.piatti" :key="item.nome">
                        <div class="di">
                            <div class="dr">
                                <span class="dn" x-text="item.nome"></span>
                                <span class="dp" x-text="item.prezzo.toFixed(2) + ' €'"></span>
                            </div>
                            <p class="ds" x-show="item.descrizione" x-text="typeof item.descrizione === 'object' ? item.descrizione[lang] : item.descrizione"></p>
                        </div>
                    </template>
                    <template x-for="sez in (cat.sezioni || [])" :key="sez.tipo">
                        <div style="background: #1a1a1a; padding: 5px 0;">
                            <div style="padding: 10px 20px; color: var(--gold); font-weight: bold; border-bottom: 1px solid #333; font-size: 0.9rem;" x-text="sez.tipo.toUpperCase()"></div>
                            <template x-for="item in sez.piatti" :key="item.nome">
                                <div class="di">
                                    <div class="dr">
                                        <span class="dn" x-text="item.nome"></span>
                                        <span class="dp" x-text="item.prezzo.toFixed(2) + ' €'"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Vico del Carmine. Osteria Pizzeria Napoletana.</p>
    </div>

</body>
</html>
