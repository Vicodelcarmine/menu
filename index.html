<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vico del Carmine - Menù Digitale</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        :root { --primary: #800020; --gold: #D4AF37; --dark: #1a1a1a; --light: #fdfdfd; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark); color: var(--light); margin: 0; padding: 0; transition: all 0.3s; }
        header { text-align: center; background-color: #f7f3e9; border-bottom: 3px solid var(--gold); }
        .hero-img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        .lang-bar { background: #000; padding: 10px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; border-bottom: 1px solid #333; }
        .lang-btn { background: none; border: none; cursor: pointer; transition: transform 0.2s; padding: 5px; opacity: 0.6; }
        .lang-btn.active { transform: scale(1.3); opacity: 1; border-bottom: 2px solid var(--gold); }
        .flag { width: 30px; height: 20px; object-fit: cover; border-radius: 2px; }
        .location-bar { background-color: var(--primary); color: white; padding: 15px; text-align: center; font-weight: 600; font-size: 0.9rem; border-bottom: 1px solid var(--gold); }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .category { margin-bottom: 40px; }
        .category-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.8rem; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 25px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .item { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; border-bottom: 1px dotted #333; padding-bottom: 10px; }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 1.15rem; color: var(--light); display: block; }
        .item-desc { font-size: 0.95rem; color: #aaa; margin-top: 5px; display: block; font-style: italic; }
        .item-price { font-weight: 600; color: var(--gold); margin-left: 15px; font-size: 1.1rem; }
        .footer { text-align: center; padding: 40px; background-color: #111; font-size: 0.85rem; color: #888; border-top: 1px solid #222; }
        [x-cloak] { display: none !important; }
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] .item { flex-direction: row-reverse; }
        .badge { background: var(--gold); color: black; font-size: 0.7rem; padding: 2px 5px; border-radius: 3px; margin-left: 10px; vertical-align: middle; text-transform: uppercase; }
    </style>
</head>
<body x-data="{ menu: {}, loading: true, lang: 'it',
    flags: {
        it: 'https://flagcdn.com/w40/it.png',
        en: 'https://flagcdn.com/w40/gb.png',
        fr: 'https://flagcdn.com/w40/fr.png',
        de: 'https://flagcdn.com/w40/de.png',
        es: 'https://flagcdn.com/w40/es.png',
        pt: 'https://flagcdn.com/w40/pt.png',
        ja: 'https://flagcdn.com/w40/jp.png',
        ar: 'https://flagcdn.com/w40/sa.png'
    }
}" x-init="fetch('./menu.json').then(res => res.json()).then(data => { menu = data; loading = false; })" :dir="lang === 'ar' ? 'rtl' : 'ltr'">

    <header><img src="hero.png" alt="Vico del Carmine Header" class="hero-img"></header>

    <div class="lang-bar">
        <template x-for="l in ['it','en','fr','de','es','pt','ja','ar']">
            <button class="lang-btn" :class="lang === l ? 'active' : ''" @click="lang = l">
                <img :src="flags[l]" :alt="l" class="flag">
            </button>
        </template>
    </div>

    <div class="location-bar">
        📍 <span x-text="menu.location"></span> | 📞 055 2336862
    </div>

    <div class="container" x-cloak x-show="!loading">
        <template x-for="cat in (menu.categorie || [])" :key="cat.slug">
            <div class="category">
                <h2 class="category-title" x-text="cat.nome[lang] || cat.nome['it'] || cat.nome"></h2>
                
                <template x-for="item in cat.piatti" :key="item.nome">
                    <div class="item">
                        <div class="item-info">
                            <span class="item-name">
                                <span x-text="item.nome"></span>
                                <template x-if="cat.slug === 'specialita-stagione' || cat.slug === 'specialita-pizza'">
                                    <span class="badge" x-text="lang === 'it' ? 'Speciale' : 'Special'"></span>
                                </template>
                            </span>
                            <span class="item-desc" x-show="item.descrizione" x-text="typeof item.descrizione === 'object' ? item.descrizione[lang] : item.descrizione"></span>
                        </div>
                        <div class="item-price" x-text="item.prezzo.toFixed(2) + ' €'"></div>
                    </div>
                </template>

                <template x-for="sez in (cat.sezioni || [])" :key="sez.tipo">
                    <div style="margin-top: 25px;">
                        <h3 style="color: var(--gold); font-size: 1.3rem; text-align: center; border-bottom: 1px solid #333; margin-bottom: 15px;" x-text="sez.tipo"></h3>
                        <template x-for="item in sez.piatti" :key="item.nome">
                            <div class="item">
                                <div class="item-info">
                                    <span class="item-name" x-text="item.nome"></span>
                                </div>
                                <div class="item-price" x-text="item.prezzo.toFixed(2) + ' €'"></div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <div class="footer">
        <p x-text="menu.note && menu.note.dolci_info ? menu.note.dolci_info[lang] : 'Tutti i nostri dolci sono fatti in casa'"></p>
        <p x-text="(lang === 'it' ? 'Coperto: ' : 'Cover charge: ') + (menu.note ? menu.note.coperto.toFixed(2) : '2.50') + ' €'"></p>
        <p>&copy; 2026 Vico del Carmine. Osteria Pizzeria Napoletana.</p>
    </div>
</body>
</html>
