<html lang="it">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--wine:#7B1E2A;--wine-dark:#5A1520;--cream:#FDF5E6;--gold:#C8A951;--gold-light:#E8D592;--charcoal:#2C2C2C;--text:#3A3A3A;--text-light:#6B6B6B;--white:#FFF;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 4px 24px rgba(0,0,0,.12)}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--text);line-height:1.6;min-height:100vh;padding-top:110px;padding-bottom:40px}

/* Language Bar */
.lang-bar{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--wine-dark);display:flex;justify-content:center;align-items:center;gap:4px;padding:12px 8px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.lang-btn{background:transparent;border:2px solid transparent;color:rgba(255,255,255,.7);font-family:'Lato',sans-serif;font-size:14px;font-weight:900;padding:8px 12px;border-radius:24px;cursor:pointer;transition:all .3s ease;white-space:nowrap;display:flex;align-items:center;gap:4px}
.lang-btn:hover{color:var(--white);background:rgba(255,255,255,.1)}
.lang-btn.active{color:var(--white);background:var(--wine);border-color:var(--gold)}
.lang-flag{font-size:18px}

/* Header */
.header{background:linear-gradient(135deg,var(--wine-dark),var(--wine));color:var(--white);text-align:center;padding:40px 20px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(32px,8vw,48px);letter-spacing:3px;margin-bottom:4px;font-weight:900}
.hs{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--gold-light);margin-bottom:15px}
.hd{width:80px;height:2px;background:var(--gold);margin:0 auto 15px}

/* Main Content */
.mc{max-width:720px;margin:0 auto;padding:16px 12px}
.ms{margin-bottom:35px;background:var(--white);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(0,0,0,0.05)}
.sh{padding:22px;background:linear-gradient(135deg,var(--wine),var(--wine-dark));color:var(--white);font-family:'Playfair Display',serif;font-size:24px;font-weight:700;text-align:center;letter-spacing:1.5px;text-transform:uppercase}
.special-header{background:linear-gradient(135deg,var(--gold),#8a6d1d) !important;color:var(--wine-dark) !important;font-size:26px !important;padding:25px !important}

/* Menu Items */
.di{padding:18px 24px;border-bottom:1px solid rgba(0,0,0,.05)}
.di:last-child{border-bottom:none}
.dr{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.dn{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;color:var(--charcoal);flex:1}
.dp{font-family:'Lato',sans-serif;font-weight:900;font-size:20px;color:var(--wine);white-space:nowrap}
.ds{font-size:15px;color:var(--text-light);margin-top:4px;font-style:italic;line-height:1.4;font-weight:400}
.section-label{padding:10px 24px;background:var(--cream);color:var(--wine-dark);font-weight:900;text-transform:uppercase;font-size:13px;letter-spacing:2px;border-bottom:1px solid var(--gold-light)}

/* Fixed Menu Box */
.fixed-menu-box{background:var(--wine);color:white;padding:20px;margin:15px 24px;border-radius:15px;text-align:center;box-shadow:var(--shadow)}
.fixed-menu-box h4{font-family:'Playfair Display',serif;color:var(--gold-light);font-size:22px;margin-bottom:5px}
.fixed-menu-box p{font-size:16px;font-weight:700}

/* Footer */
.footer{background:var(--charcoal);color:rgba(255,255,255,.7);text-align:center;padding:40px 20px;margin-top:30px}

/* Responsive */
@media(max-width:480px){
  body{padding-top:100px}
  .dn, .dp{font-size:18px}
  .sh{font-size:20px}
  .special-header{font-size:22px !important}
}
</style>
</head>

let currentLang = 'it';

function setLanguage(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(lang));
  });
  renderMenu();
}

function renderMenu() {
  const container = document.getElementById('menu-container');
  container.innerHTML = '';

  menuData.sections.forEach(section => {
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'ms';
    if(section.isSpecial) sectionDiv.style.border = '3px solid var(--gold)';

    const header = document.createElement('div');
    header.className = 'sh' + (section.isSpecial ? ' special-header' : '');
    header.innerText = section.title[currentLang];
    sectionDiv.appendChild(header);

    const body = document.createElement('div');
    section.items.forEach(item => {
      if (item.label) {
        const label = document.createElement('div');
        label.className = 'section-label';
        label.innerText = item.label[currentLang];
        body.appendChild(label);
      } else if (item.isFixed) {
        const box = document.createElement('div');
        box.className = 'fixed-menu-box';
        box.innerHTML = `<h4>${item.name[currentLang]} – ${item.price}</h4><p>${item.desc[currentLang]}</p>`;
        body.appendChild(box);
      } else {
        const di = document.createElement('div');
        di.className = 'di';
        di.innerHTML = `<div class="dr"><span class="dn">${item.name[currentLang]}</span><span class="dp">${item.price}</span></div>`;
        if (item.desc) {
          di.innerHTML += `<p class="ds">${item.desc[currentLang]}</p>`;
        }
        body.appendChild(di);
      }
    });
    sectionDiv.appendChild(body);
    container.appendChild(sectionDiv);
  });
}

// Auto-detect language
const userLang = navigator.language.substring(0, 2).toLowerCase();
if (['en', 'fr', 'de', 'es', 'pt'].includes(userLang)) {
  currentLang = userLang;
}
setLanguage(currentLang);
