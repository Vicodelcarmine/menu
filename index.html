<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vico del Carmine - Menù Digitale</title>
    <!-- Font Eleganti -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        :root {
            --primary: #800020; /* Amaranto Vico */
            --gold: #D4AF37;
            --dark: #1a1a1a;
            --light: #fdfdfd;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://vicodelcarmine.github.io/menu/img/locale.jpg');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid var(--gold);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .location {
            font-style: italic;
            color: #ccc;
            margin-top: 10px;
            display: block;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .category {
            margin-bottom: 40px;
        }

        .category-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.8rem;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--light);
        }

        .item-desc {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 4px;
            display: block;
        }

        .item-price {
            font-weight: 600;
            color: var(--gold);
            margin-left: 15px;
        }

        .footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: #666;
        }

        /* Loading animation */
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="{ menu: {}, loading: true }" x-init="fetch('./menu.json').then(res => res.json()).then(data => { menu = data; loading = false; })">

    <header>
        <h1>Vico del Carmine</h1>
        <span class="location" x-text="menu.location || 'Via Pisana 40/r, Firenze'"></span>
    </header>

    <div class="container" x-cloak x-show="!loading">
        <template x-for="cat in menu.categorie" :key="cat.slug">
            <div class="category">
                <h2 class="category-title" x-text="cat.nome"></h2>
                
                <!-- Piatti standard -->
                <template x-for="item in cat.piatti" :key="item.nome">
                    <div class="item">
                        <div class="item-info">
                            <span class="item-name" x-text="item.nome"></span>
                            <span class="item-desc" x-show="item.descrizione" x-text="item.descrizione"></span>
                        </div>
                        <div class="item-price" x-text="item.prezzo.toFixed(2) + ' €'"></div>
                    </div>
                </template>

                <!-- Sezioni speciali (come i Vini) -->
                <template x-for="sez in cat.sezioni" :key="sez.tipo">
                    <div style="margin-top: 20px;">
                        <h3 style="color: var(--gold); font-size: 1.2rem;" x-text="sez.tipo"></h3>
                        <template x-for="item in sez.piatti" :key="item.nome">
                            <div class="item">
                                <div class="item-info">
                                    <span class="item-name" x-text="item.nome"></span>
                                </div>
                                <div class="item-price" x-text="item.prezzo.toFixed(2) + ' €'"></div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <div class="footer">
        <p>&copy; 2026 Vico del Carmine. Prezzi espressi in Euro.</p>
        <p x-text="'Coperto: ' + (menu.note ? menu.note.coperto.toFixed(2) : '2.50') + ' €'"></p>
    </div>

</body>
</html>
